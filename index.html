<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu App</title>
    <link rel="stylesheet" href="styles.css?v=blue-theme-v1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="menu-container">
        <header class="menu-header">
            <h1 class="menu-title">Vapes & Concentrates</h1>
        </header>

        <div class="scrolling-wrapper" id="scrolling-wrapper">
            <div class="menu-content" id="menu-content">
                <!-- Data will be injected here by JS -->
            </div>
        </div>
    </div>

    <script src="script.js?v=blue-theme-v1"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
